name: Bygg og deploy forstegangsbehandling

on:
  push:
    paths:
      - "forstegangsbehandling/**"
      - "felles/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/førstegangsbehandling.yml"
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 3'
      timezone: 'Europe/Oslo'
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.x'
          cache: 'gradle'
      - name: Test and build
        run: ./gradlew :forstegangsbehandling:build --info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build container image
        if: ${{ github.ref_name == 'main' }}
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: tbd
          image_suffix: forstegangsbehandling
          docker_context: forstegangsbehandling
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deployDev:
    name: Deploy to dev
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: forstegangsbehandling/deploy/nais.yml
          VARS: forstegangsbehandling/deploy/dev.yml
          VAR: image=${{ needs.build.outputs.image }}

  deployProd:
    name: Deploy to prod
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: forstegangsbehandling/deploy/nais.yml
          VARS: forstegangsbehandling/deploy/prod.yml
          VAR: image=${{ needs.build.outputs.image }}
